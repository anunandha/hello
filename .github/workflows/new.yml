name: Deploy WAR to EC2

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package

      - name: Copy WAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/*.war"
          target: "/home/ec2-user/deploy-temp"
          strip_components: 0

      - name: Deploy WAR and Restart Tomcat
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            TOMCAT_DIR=/opt/tomcat
            WAR_SOURCE=/home/ec2-user/deploy-temp/*.war

            # Extract Tomcat if not already extracted
            if [ ! -d "$TOMCAT_DIR" ]; then
              sudo tar -xzf /opt/apache-tomcat-10.1.52.tar.gz -C /opt
              sudo mv /opt/apache-tomcat-10.1.52 "$TOMCAT_DIR"
              sudo chmod +x "$TOMCAT_DIR/bin/"*.sh
            fi

            # Stop Tomcat if running
            if pgrep -f 'org.apache.catalina.startup.Bootstrap'; then
              sudo "$TOMCAT_DIR/bin/shutdown.sh"
              sleep 5
            fi

            # Deploy WAR as ROOT.war
            sudo mv $WAR_SOURCE "$TOMCAT_DIR/webapps/ROOT.war"
            sudo chown -R ec2-user:ec2-user "$TOMCAT_DIR/webapps/ROOT.war"

            # Start Tomcat
            sudo "$TOMCAT_DIR/bin/startup.sh"
